name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    name: Build source archive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Build sdist
        run: uv build --sdist --out-dir dist/
      - name: Upload sdist to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz

  test-on-release:
    name: Tests (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install with dev dependencies
        run: uv sync --group dev
      - name: Run pytest
        run: uv run pytest

  release-summary:
    name: Release summary
    needs: [build-release, test-on-release]
    runs-on: ubuntu-latest
    steps:
      - name: Print release info
        run: |
          echo "✅ Release ${{ github.ref_name }} published"
          echo "📦 Source archive attached to GitHub Release"
          echo "🔗 Zenodo will archive this release automatically"