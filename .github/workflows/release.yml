name: Release

on:
  push:
    tags:
      - "v*"

jobs:

  build-release:
    name: Build source archive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist --outdir dist/

      - name: Upload sdist to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz

  test-on-release:
    name: Tests (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install with dev extras
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest

  # ── 3. Notify on success ─────────────────────────────────────────────────
  release-summary:
    name: Release summary
    needs: [build-release, test-on-release]
    runs-on: ubuntu-latest
    steps:
      - name: Print release info
        run: |
          echo "✅ Release ${{ github.event.release.tag_name }} published"
          echo "📦 Source archive attached to GitHub Release"
          echo "🔗 Zenodo will archive this release automatically"
          echo "   (requires repo connected at zenodo.org/account/settings/github)"
